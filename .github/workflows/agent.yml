# Agent quality gate: lint, unit tests, and evaluation suite.
# Runs on PRs and push to main/dev. No OpenAI or live Ghostfolio required (fixture LLM/tools).
name: Agent

on:
  pull_request:
    paths:
      - 'apps/agent/**'
      - 'libs/**'
      - '.github/workflows/agent.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/agent/**'
      - 'libs/**'
      - '.github/workflows/agent.yml'

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint agent
        run: npx nx run agent:lint

      - name: Test agent
        run: npx dotenv-cli -e .env.example -- npx nx test agent

      - name: Run agent evals
        run: npx ts-node apps/agent/server/eval/run-default-evals.ts
        env:
          EVAL_USE_REAL_LLM: 'false'
          EVAL_USE_LIVE_TOOLS: 'false'
